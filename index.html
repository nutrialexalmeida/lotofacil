<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Otimizador Lotofácil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#14121C;--panel:#1C1A2B;--panel2:#242235;--border:#322F47;--text:#E8E6F0;
    --muted:#9D99B5;--faint:#6B6781;--accent:#A855F7;--accent2:#E11D9B;--ret:#34D399;
    --cost:#FB7185;--gold:#F5C84C;--grid-empty:#211F30;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--accent);color:#fff;}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 80px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent);}
  h1{font-size:clamp(26px,4.4vw,40px);font-weight:700;line-height:1.02;margin:6px 0 4px;letter-spacing:-.02em;}
  .sub{color:var(--muted);font-size:14px;max-width:64ch;line-height:1.45;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:22px 0 18px;border-bottom:1px solid var(--border);}
  .tab{background:none;border:none;color:var(--muted);padding:10px 14px;font-size:13.5px;
    font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
  .tab:hover{color:var(--text);}
  .tab.on{color:var(--text);border-bottom-color:var(--accent);}
  .tab .n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);margin-right:7px;}
  .tab.on .n{color:var(--accent);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
  .panel h2{font-size:16px;font-weight:600;margin:0 0 3px;letter-spacing:-.01em;}
  .panel .desc{color:var(--muted);font-size:12.5px;margin:0 0 14px;line-height:1.45;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}}
  .volante{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:340px;}
  .cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;
    background:var(--grid-empty);border:1px solid var(--border);color:var(--muted);
    user-select:none;transition:transform .08s,border-color .12s;}
  .cell.click{cursor:pointer;}
  .cell.click:hover{transform:translateY(-2px);border-color:var(--accent);}
  .cell.on{background:linear-gradient(160deg,var(--accent),var(--accent2));color:#fff;
    border-color:transparent;box-shadow:0 4px 14px rgba(168,85,247,.35);}
  .cell .pct{font-size:8.5px;font-weight:400;opacity:.8;margin-top:1px;}
  label.fld{display:block;font-size:11px;color:var(--muted);letter-spacing:.04em;
    text-transform:uppercase;margin:0 0 5px;}
  input[type=number],input[type=text],select,textarea{width:100%;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;
    font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row>div{flex:1;min-width:120px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 18px;
    font-weight:600;font-size:14px;transition:.15s;}
  .btn:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 14px;}
  .btn.ghost:hover{border-color:var(--accent);}
  .btn.gold{background:var(--gold);color:#2a2206;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{background:var(--panel2);border:1px solid var(--border);border-radius:999px;
    padding:5px 11px;font-size:12px;color:var(--muted);transition:.12s;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip:hover{color:var(--text);}
  table{border-collapse:collapse;width:100%;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  th,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border);}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--faint);font-weight:500;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;}
  .stat{background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:14px;}
  .stat .k{font-size:10.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .stat .v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;margin-top:3px;letter-spacing:-.02em;}
  .stat .v.sm{font-size:17px;}
  .pos{color:var(--ret);}.neg{color:var(--cost);}.acc{color:var(--accent);}.gld{color:var(--gold);}
  .note{font-size:12px;color:var(--muted);background:rgba(168,85,247,.07);
    border-left:2px solid var(--accent);padding:10px 12px;border-radius:0 8px 8px 0;line-height:1.5;}
  .warn{border-left-color:var(--gold);background:rgba(245,200,76,.08);}
  .pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;
    padding:2px 8px;border-radius:999px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);}
  .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}
  .barwrap{height:10px;background:var(--panel2);border-radius:5px;overflow:hidden;}
  .bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .hr{height:1px;background:var(--border);margin:14px 0;border:none;}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-wrap:wrap;}
  .seg button{background:none;border:none;color:var(--muted);padding:7px 12px;font-size:12.5px;}
  .seg button.on{background:var(--accent);color:#fff;}
  .foot{color:var(--faint);font-size:11.5px;text-align:center;margin-top:30px;line-height:1.6;}
  .jogo{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .jogo .idx{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);min-width:34px;}
  .dz{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;
    background:linear-gradient(160deg,rgba(168,85,247,.22),rgba(225,29,155,.18));
    border:1px solid var(--border);color:var(--text);}
  .dz.fix{background:linear-gradient(160deg,rgba(245,200,76,.32),rgba(245,200,76,.14));border-color:var(--gold);color:var(--gold);}
  svg text{font-family:'JetBrains Mono',monospace;}
  @media print{body{background:#fff;color:#000;}.noprint{display:none!important;}
    .jogo{border-color:#ccc;}.dz{background:#eee;border:1px solid #999;color:#000;}.dz.fix{background:#fff;border:2px solid #000;font-weight:700;}}
</style></head><body><div id="root"></div>
